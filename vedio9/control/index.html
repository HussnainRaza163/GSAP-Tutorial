<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gsap</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box"></div>
    <div class="control">
        <button id="play" onclick="lt.play()">Play</button>
        <button id="pause" onclick="lt.pause()"> Pause</button>
        <button id="reverse" onclick="lt.reverse()">Reverse</button>
        <button id="resume" onclick="lt.resume()">Resume</button>
        <button id="restart" onclick="lt.restart()">Restart</button>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="main.js"></script>
  </body>
</html>
